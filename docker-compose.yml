version: '3.8'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freelance_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - freelance_network
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: freelance_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - freelance_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: freelance_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: freelance_platform
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: freelance_user
      MYSQL_PASSWORD: freelance_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - freelance_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: freelance_pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - freelance_network
    depends_on:
      - db

networks:
  freelance_network:
    driver: bridge

volumes:
  db_data: